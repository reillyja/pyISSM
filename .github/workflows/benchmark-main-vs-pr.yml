name: Benchmark main vs PR

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - ".github/workflows/**"
      - "pyproject.toml"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  SLOWDOWN_THRESHOLD_PERCENT: "20"

jobs:
  benchmark_main:
    name: Benchmark main
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ISSM_DIR: ${{ github.workspace }}/issm
      CC: ${{ github.workspace }}/issm/externalpackages/petsc/install/bin/mpicc
      CXX: ${{ github.workspace }}/issm/externalpackages/petsc/install/bin/mpicxx
      FC: ${{ github.workspace }}/issm/externalpackages/petsc/install/bin/mpifort
      F77: ${{ github.workspace }}/issm/externalpackages/petsc/install/bin/mpifort
      F90: ${{ github.workspace }}/issm/externalpackages/petsc/install/bin/mpifort

    steps:
      - name: Checkout pyISSM main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: repo

      - name: Show checked out main commit
        working-directory: repo
        run: |
          echo "Expected base SHA: ${{ github.event.pull_request.base.sha }}"
          git rev-parse HEAD
          git show -1 --stat

      - name: Get latest ISSM release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --repo access-nri/issm --json tagName -q .tagName)
          echo "ISSM_RELEASE=$LATEST" >> "$GITHUB_ENV"
          echo "Using release: $LATEST"

      - name: Checkout ISSM latest release
        uses: actions/checkout@v4
        with:
          repository: access-nri/issm
          ref: ${{ env.ISSM_RELEASE }}
          path: issm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install numpy scipy netcdf4 matplotlib pytest
          python -m pip install -e ./repo

      - name: Restore/build ISSM cache
        uses: actions/cache@v4
        id: cache-issm-build
        with:
          path: ${{ env.ISSM_DIR }}
          key: issm-${{ env.ISSM_RELEASE }}-python${{ env.PYTHON_VERSION }}-${{ runner.os }}

      - name: Install external packages
        if: steps.cache-issm-build.outputs.cache-hit != 'true'
        shell: bash
        run: |
          source "$ISSM_DIR/etc/environment.sh"
          cd "$ISSM_DIR/externalpackages/triangle" && ./install-linux.sh
          cd "$ISSM_DIR/externalpackages/m1qn3"    && ./install-linux.sh
          cd "$ISSM_DIR/externalpackages/petsc"    && ./install-3.22-linux.sh
          cd "$ISSM_DIR/externalpackages/semic"    && ./install.sh

      - name: Build ISSM
        if: steps.cache-issm-build.outputs.cache-hit != 'true'
        working-directory: issm
        shell: bash
        run: |
          export PYTHON_ROOT="$pythonLocation"
          source "$ISSM_DIR/etc/environment.sh"
          autoreconf -ivf
          ./configure \
            --prefix="${ISSM_DIR}" \
            --disable-static \
            --enable-development \
            --enable-debugging \
            --with-numthreads=4 \
            --with-python="${PYTHON_ROOT}/bin/python3" \
            --with-fortran-lib="-L/usr/lib/x86_64-linux-gnu -lgfortran" \
            --with-mpi-include="${ISSM_DIR}/externalpackages/petsc/install/include" \
            --with-mpi-libflags="-L${ISSM_DIR}/externalpackages/petsc/install/lib -lmpi -lmpicxx -lmpifort" \
            --with-petsc-dir="${ISSM_DIR}/externalpackages/petsc/install" \
            --with-blas-lapack-dir="${ISSM_DIR}/externalpackages/petsc/install" \
            --with-metis-dir="${ISSM_DIR}/externalpackages/petsc/install" \
            --with-parmetis-dir="${ISSM_DIR}/externalpackages/petsc/install" \
            --with-scalapack-dir="${ISSM_DIR}/externalpackages/petsc/install" \
            --with-mumps-dir="${ISSM_DIR}/externalpackages/petsc/install" \
            --with-triangle-dir="${ISSM_DIR}/externalpackages/triangle/install" \
            --with-semic-dir="${ISSM_DIR}/externalpackages/semic/install" \
            --with-m1qn3-dir="${ISSM_DIR}/externalpackages/m1qn3/install"

      - name: Compile ISSM
        if: steps.cache-issm-build.outputs.cache-hit != 'true'
        working-directory: issm
        run: |
          make -j 4
          make install

      - name: Run benchmark on main
        working-directory: repo/test/general
        shell: bash
        run: |
          source "$ISSM_DIR/etc/environment.sh"
          mkdir -p ../../benchmark-results
          pytest -s benchmarking/test_benchmark_test110.py | tee ../../benchmark-results/main.log

      - name: Extract main average runtime
        working-directory: repo
        shell: python
        run: |
          import pathlib
          import re
          import sys

          text = pathlib.Path("benchmark-results/main.log").read_text()
          match = re.search(r"avg\s*:\s*([0-9.]+)\s*s", text)
          if not match:
              print("Could not find average runtime in main.log", file=sys.stderr)
              sys.exit(1)

          avg = match.group(1)
          pathlib.Path("benchmark-results/main_avg.txt").write_text(avg + "\n")
          print(f"Main average runtime: {avg} s")

      - name: Upload main benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-main
          path: repo/benchmark-results

